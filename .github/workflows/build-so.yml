name: Reproducible Build + SO Attestation

# Triggers:
#  - On every push to main (smoke test)
#  - On every tag starting with "v*" (official release attestation)
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 10
  # Pin the Rust toolchain for reproducibility. Bump deliberately, not on every
  # rustc stable release, to avoid breakage from tightened lints / visibility rules.
  RUST_TOOLCHAIN: "1.94.1"

permissions:
  contents: write        # create releases + upload assets
  id-token: write        # SLSA provenance (OIDC token)
  attestations: write    # attest-build-provenance

jobs:
  build-android:
    name: aarch64-linux-android (deterministic release)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (pinned commit)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain (pinned)
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: aarch64-linux-android

      - name: Set up Android NDK
        id: ndk
        uses: nttld/setup-ndk@afb4c9964b521afb97c864b7d40b11e6911bd410  # v1.5.0
        with:
          ndk-version: r26d
          add-to-path: false

      - name: Configure cargo for Android cross-compile
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<CARGOCFG
          [target.aarch64-linux-android]
          ar = "${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          linker = "${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang"
          CARGOCFG

      - name: Cargo build --release --locked
        env:
          SOURCE_DATE_EPOCH: "1704067200"   # 2024-01-01 00:00 UTC — forces reproducible timestamps
          # cc-rs (used by ring, zstd-sys, etc.) doesn't read Cargo's linker config.
          # Point it at the versioned NDK clang explicitly.
          CC_aarch64_linux_android:  "${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang"
          CXX_aarch64_linux_android: "${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang++"
          AR_aarch64_linux_android:  "${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
        run: |
          cargo build \
            --release \
            --locked \
            --target aarch64-linux-android

      - name: Locate + hash the built shared object
        id: hash
        run: |
          SO="target/aarch64-linux-android/release/libivy_crypto_core.so"
          if [ ! -f "$SO" ]; then
            echo "::error::Expected SO not found at $SO"
            exit 1
          fi

          SIZE=$(stat -c%s "$SO")
          SHA256=$(sha256sum "$SO" | awk '{print $1}')
          SHA512=$(sha512sum "$SO" | awk '{print $1}')
          BLAKE3=$(b3sum --no-names "$SO" 2>/dev/null || echo "n/a (b3sum not installed)")

          echo "so_path=$SO"           >> "$GITHUB_OUTPUT"
          echo "so_size=$SIZE"         >> "$GITHUB_OUTPUT"
          echo "so_sha256=$SHA256"     >> "$GITHUB_OUTPUT"
          echo "so_sha512=$SHA512"     >> "$GITHUB_OUTPUT"
          echo "so_blake3=$BLAKE3"     >> "$GITHUB_OUTPUT"

          echo "## 🔏 libivy_crypto_core.so attestation" >> "$GITHUB_STEP_SUMMARY"
          echo ""                                          >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |"                         >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|"                                 >> "$GITHUB_STEP_SUMMARY"
          echo "| Target | \`aarch64-linux-android\` |"    >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${GITHUB_SHA}\` |"            >> "$GITHUB_STEP_SUMMARY"
          echo "| Ref    | \`${GITHUB_REF}\` |"            >> "$GITHUB_STEP_SUMMARY"
          echo "| Size   | ${SIZE} bytes |"                >> "$GITHUB_STEP_SUMMARY"
          echo "| SHA256 | \`${SHA256}\` |"                >> "$GITHUB_STEP_SUMMARY"
          echo "| SHA512 | \`${SHA512}\` |"                >> "$GITHUB_STEP_SUMMARY"
          echo "| BLAKE3 | \`${BLAKE3}\` |"                >> "$GITHUB_STEP_SUMMARY"

          # Also echo to the log for grep-ability
          echo
          echo "================ SO ATTESTATION ================"
          echo "commit=$GITHUB_SHA"
          echo "ref=$GITHUB_REF"
          echo "size=$SIZE"
          echo "sha256=$SHA256"
          echo "sha512=$SHA512"
          echo "blake3=$BLAKE3"
          echo "================================================"

      - name: Upload .so artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: libivy_crypto_core-${{ github.sha }}
          path: target/aarch64-linux-android/release/libivy_crypto_core.so
          retention-days: 90

      - name: Generate SLSA provenance attestation (release only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2  # v2.2.0
        with:
          subject-path: target/aarch64-linux-android/release/libivy_crypto_core.so

      - name: Write ATTESTATION.txt to release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          cat > ATTESTATION.txt <<EOF
          Ivy Crypto Core — Build Attestation
          ====================================
          Tag         : ${TAG}
          Commit      : ${GITHUB_SHA}
          Target      : aarch64-linux-android
          Rust        : $(rustc --version)
          SOURCE_DATE_EPOCH : ${SOURCE_DATE_EPOCH}
          Size (bytes): ${{ steps.hash.outputs.so_size }}
          SHA256      : ${{ steps.hash.outputs.so_sha256 }}
          SHA512      : ${{ steps.hash.outputs.so_sha512 }}
          BLAKE3      : ${{ steps.hash.outputs.so_blake3 }}

          Verify locally:
            git clone https://github.com/ebh2024ebh/ivy-crypto-core
            cd ivy-crypto-core
            git checkout ${TAG}
            cargo build --release --locked --target aarch64-linux-android
            sha256sum target/aarch64-linux-android/release/libivy_crypto_core.so
          EOF
          cat ATTESTATION.txt

      - name: Attach ATTESTATION.txt to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191  # v2.0.8
        with:
          files: |
            target/aarch64-linux-android/release/libivy_crypto_core.so
            ATTESTATION.txt
